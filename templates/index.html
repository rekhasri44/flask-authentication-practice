{% extends "base.html" %}
{% block title%}Index Page{% endblock %}
{% block content %}
    <h1?Hello world</h1>
        <form method="POST" action=:{{ url_for('index')}}">
            <input type="text" name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Password">
            <input type="submit" value="Login">
        </form>

        <h1>File Upload</h1>
        <form method = "POST" action="{{url_for('file_upload')}}" enctype="multipart/form-data">
            <input type="file" name="file" accept="application/vnd.openxmlformats-officedocument.spreasheet, application/vnd.ms-excel, text/plain" required="required">
            <input type="submit" value="upload file">
        </form>

        
{% endblock %}
